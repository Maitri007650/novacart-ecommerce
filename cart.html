<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>

Cart

</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<header>

<div class="logo">

NovaCart

</div>

<nav>

<a href="index.html">

Home

</a>

<a href="product.html">

Products

</a>

<a href="cart.html">

Cart

</a>

<a href="about.html">

About</a>

<a href="contact.html">

Contact

</a>

</nav>

</header>

<section
class="featured">

<h1>

Your Cart

</h1>

<div
id="cartArea">

</div>

</section>

<footer>

<p>

NovaCart © 2026

</p>

</footer>

<script>

let item=

JSON.parse(

localStorage
.getItem(
"cart"
)

);


if(
item
)
{

document
.getElementById(
"cartArea"
)
.innerHTML=`

<div
class="preview-card">

<h2>

${item.name}

</h2>

<p>

${item.price}

</p>

<button>

Added ✓

</button>

</div>

`;

}

else{

document
.getElementById(
"cartArea"
)
.innerHTML=`

<div
class="preview-card">

<h2>

Cart Empty

</h2>

<p>

Select a product first

</p>

</div>

`;

}

</script>

</body>

</html>
